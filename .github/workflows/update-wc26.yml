name: Update World Cup 2026 Widgets

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate AI prediction panels
        run: python scripts/generate_predictions.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh World Cup 2026 widgets"
          file_pattern: ".github/wc26/* README.md"
