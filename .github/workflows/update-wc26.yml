name: Update World Cup 2026 Widgets

on:
  schedule:
    - cron: "0 */6 * * *"  # 每 6 小时刷新
  workflow_dispatch: {}     # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: moose25/world-cup-2026-readme-widget@v1.0.0
        with:
          panels: "countdown,match,today,r32,bracket"
          tz: "Asia/Shanghai"
          theme: "dark"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh World Cup 2026 widgets"
          file_pattern: ".github/wc26/* README.md"
